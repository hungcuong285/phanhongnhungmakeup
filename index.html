<!DOCTYPE html>
<html lang="vi">

<head>
  <!-- ============================================
       PhanHongNhungMakeup - Splash / Chọn Nền Tảng
       Trang chủ: Người dùng chọn đến từ Meta hoặc TikTok
       ============================================ -->

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">

  <!-- SEO Meta Tags -->
  <title>PhanHongNhungMakeup | Chuyên gia trang điểm</title>
  <meta name="description"
    content="PhanHongNhungMakeup - Chuyên gia trang điểm, KOC Affiliate, review mỹ phẩm high-end & drugstore. Theo dõi trên Facebook, Instagram, Threads, TikTok.">
  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:title" content="PhanHongNhungMakeup | Chuyên gia trang điểm">
  <meta property="og:description" content="Theo dõi mình và khám phá sản phẩm mỹ phẩm yêu thích!">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="vi_VN">

  <!-- Mobile config -->
  <meta name="theme-color" content="#c9907d">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- ============================================
       TRANG SPLASH - CHỌN NỀN TẢNG
       
       Người dùng chọn đến từ đâu để được điều
       hướng tới trang tối ưu cho nền tảng đó.
       ============================================ -->
  <div class="splash-container">

    <!-- Avatar -->
    <div class="splash-avatar" id="splash-avatar">
      <i class="fa-solid fa-wand-magic-sparkles avatar-placeholder"></i>
    </div>

    <!-- Tên thương hiệu -->
    <h1 class="splash-brand">PhanHongNhungMakeup</h1>

    <!-- Tagline -->
    <p class="splash-tagline">doanh nghiệp 10m²</p>

    <!-- Bio -->
    <p class="splash-bio">
      Chuyên gia trang điểm | KOC Affiliate | Review Mỹ phẩm High-end & Drugstore.
    </p>

    <!-- Hướng dẫn -->
    <p class="splash-prompt">Bạn đến từ đâu?</p>

    <!-- Nút chọn nền tảng -->
    <div class="splash-buttons">

      <!-- Nút Meta (Facebook / Instagram / Threads) -->
      <a href="meta.html" class="splash-btn meta" id="splash-meta">
        <span class="btn-icons">
          <i class="fa-brands fa-facebook"></i>
          <i class="fa-brands fa-instagram"></i>
          <i class="fa-brands fa-threads"></i>
        </span>
        <span class="btn-label">
          Facebook · Instagram · Threads
          <span class="btn-sublabel">Mở trực tiếp trong ứng dụng Meta</span>
        </span>
        <i class="fa-solid fa-chevron-right btn-arrow"></i>
      </a>

      <!-- Nút TikTok -->
      <a href="tiktok.html" class="splash-btn tiktok-btn" id="splash-tiktok">
        <span class="btn-icons">
          <i class="fa-brands fa-tiktok"></i>
        </span>
        <span class="btn-label">
          TikTok
          <span class="btn-sublabel">Mở trực tiếp trong ứng dụng TikTok</span>
        </span>
        <i class="fa-solid fa-chevron-right btn-arrow"></i>
      </a>

    </div>

    <!-- Footer splash -->
    <footer class="splash-footer">
      <p class="footer-text">© 2024 PhanHongNhungMakeup. All Rights Reserved.</p>
    </footer>

  </div>
</body>

</html>
